            const handleFile = (e) => {
                const f = e.target.files[0];
                if (f) {
                    setFileType(f.type);
                    setFileName(f.name);
                    const r = new FileReader();
                    r.onload = (e) => {
                        setImg(e.target.result);
                        setStep("verify");
                    };
                    r.readAsDataURL(f);
                }
            };

            const handleFinalSubmit = async () => {
                setIsSubmitting(true);
                const storageKey = `letus_docs_${data.user.name}_${data.user.phone}`;
                const saved = localStorage.getItem(storageKey);
                let currentChecklist = saved ? JSON.parse(saved) : (data.user.role === 'manager' ? MANAGER_CHECKLIST : COURIER_CHECKLIST);

                const updatedChecklist = currentChecklist.map(item =>
                    item.id === data.item.id ? { ...item, status: 'completed' } : item
                );
                localStorage.setItem(storageKey, JSON.stringify(updatedChecklist));

                const allSubmissions = JSON.parse(localStorage.getItem('letus_all_submissions') || '[]');
                allSubmissions.push({
                    user: data.user,
                    docId: data.item.id,
                    docTitle: data.item.title,
                    timestamp: new Date().toISOString(),
                    fileName: fileName
                });
                localStorage.setItem('letus_all_submissions', JSON.stringify(allSubmissions));

                const WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/26454548/uevb7uh/";
                const payload = {
                    timestamp: new Date().toISOString(),
                    user: {
                        name: data.user.name,
                        region: data.user.region,
                        subRegion: data.user.subRegion,
                        role: data.user.role
                    },
                    document: {
                        id: data.item.id,
                        title: data.item.title,
                        required: data.item.required,
                        fileName: fileName
                    }
                };

                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    alert("서류가 성공적으로 제출되었습니다.");
                    onNavigate(-1);

                    alert("전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");

                                    {isExpanded && (
                                        <div className="border-t">
                                            <table className="w-full text-sm">
                                                <thead className="bg-slate-50">
                                                    <tr>
                                                        <th className="p-3 pl-6 text-left font-medium text-slate-500">영업소명</th>
                                                        <th className="p-3 text-left font-medium text-slate-500">소장명</th>
                                                        <th className="p-3 text-center font-medium text-slate-500">총원</th>
                                                        <th className="p-3 text-center font-medium text-slate-500">제출</th>
                                                        <th className="p-3 text-center font-medium text-slate-500">취합률</th>
                                                        <th className="p-3 text-left font-medium text-slate-500">비고</th>
                                                        <th className="p-3 pr-6 text-center font-medium text-slate-500">편집</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y">
                                                    {section.offices.map((officeName, idx) => {
                                                        const d = getOfficeData(officeName);
                                                        const isEditing = editingOffice === officeName;
                                                        const rateColor = d.stats.rate >= 80 ? 'text-green-600 bg-green-50' : d.stats.rate >= 50 ? 'text-yellow-600 bg-yellow-50' : 'text-red-600 bg-red-50';

                                                        return (
                                                            <tr key={idx} className="bg-white hover:bg-slate-50/50">
                                                                <td className="p-3 pl-6 font-medium text-slate-800">{officeName}</td>
                                                                <td className="p-3 text-slate-600">{d.managerName}</td>
                                                                {isEditing ? (
                                                                    <>
                                                                        <td className="p-3 text-center"><input type="number" className="w-16 h-8 text-center rounded border border-blue-300 bg-blue-50 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" value={editValues.total} onChange={e => setEditValues({ ...editValues, total: e.target.value })} /></td>
                                                                        <td className="p-3 text-center"><input type="number" className="w-16 h-8 text-center rounded border border-blue-300 bg-blue-50 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-blue-400" value={editValues.submitted} onChange={e => setEditValues({ ...editValues, submitted: e.target.value })} /></td>
                                                                        <td className="p-3 text-center"><span className="text-xs text-slate-400">—</span></td>
                                                                        <td className="p-3"><input type="text" className="w-full h-8 px-2 rounded border border-blue-300 bg-blue-50 text-xs focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="메모 입력" value={editValues.notes} onChange={e => setEditValues({ ...editValues, notes: e.target.value })} /></td>
                                                                        <td className="p-3 pr-6 text-center">
                                                                            <div className="flex items-center justify-center gap-1">
                                                                                <button onClick={() => saveEdit(officeName)} className="p-1.5 rounded-md bg-green-100 text-green-700 hover:bg-green-200 transition-colors"><Icons.Check className="h-3.5 w-3.5" /></button>
                                                                                <button onClick={cancelEdit} className="p-1.5 rounded-md bg-red-100 text-red-700 hover:bg-red-200 transition-colors"><Icons.X className="h-3.5 w-3.5" /></button>
                                                                            </div>
                                                                        </td>
                                                                    </>
                                                                ) : (
                                                                    <>
                                                                        <td className="p-3 text-center font-bold">{d.stats.total}</td>
                                                                        <td className="p-3 text-center font-bold" style={{ color: section.color }}>{d.stats.submitted}</td>
                                                                        <td className="p-3 text-center"><span className={`text-xs font-bold px-2 py-1 rounded-full ${rateColor}`}>{d.stats.rate}%</span></td>
                                                                        <td className="p-3 text-xs text-slate-400">{d.notes || ""}</td>
                                                                        <td className="p-3 pr-6 text-center">
                                                                            <button onClick={() => startEdit(officeName)} className="p-1.5 rounded-md hover:bg-slate-100 text-slate-400 hover:text-letus-orange transition-colors"><Icons.Pencil className="h-3.5 w-3.5" /></button>
                                                                        </td>
                                                                    </>
                                                                )}
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                            {/* Section Footer */}
                                            <div className="bg-slate-50 px-6 py-3 flex justify-between items-center border-t">
                                                <span className="text-xs text-slate-500">섹션 합계</span>
                                                <div className="flex items-center gap-4 text-xs">
                                                    <span className="font-medium">총원 <span className="font-bold text-slate-800">{secTotal}</span></span>
                                                    <span className="font-medium">제출 <span className="font-bold" style={{ color: section.color }}>{secSubmitted}</span></span>
                                                    <span className="font-medium">미제출 <span className="font-bold text-red-500">{secTotal - secSubmitted}</span></span>
                                                    <span className="font-bold px-2 py-0.5 rounded-full" style={{ backgroundColor: section.color + '15', color: section.color }}>{secRate}%</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </Card>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const CourierDashboard = ({ user, onNavigate }) => {
            const storageKey = `letus_docs_${user.name}_${user.phone}`;
            const [checklist, setChecklist] = useState(() => {
                const saved = localStorage.getItem(storageKey);
                return saved ? JSON.parse(saved) : COURIER_CHECKLIST;
            });

            const progress = Math.round((checklist.filter(i => i.status === 'completed').length / checklist.length) * 100);

            return (
                <div className="min-h-screen bg-slate-50 pb-20">
                    <div className="bg-gradient-to-br from-letus-charcoal to-letus-black text-white p-6 pb-12 rounded-b-[2rem] shadow-xl">
                        <div className="flex justify-between items-start text-white">
                            <div>
                                <div className="flex items-center gap-2 text-letus-orange mb-1 font-bold text-sm">
                                    <Icons.Truck className="h-4 w-4" /> {user.region}
                                </div>
                                <h1 className="text-2xl font-bold">{user.name} 기사님</h1>
                            </div>
                            <div className="flex flex-col items-end gap-2">
                                <Button variant="ghost" size="sm" className="text-white hover:bg-white/10" onClick={() => onNavigate('landing')}>
                                    <Icons.LogOut className="h-4 w-4 mr-2" /> 나가기
                                </Button>
                                <div className="text-right">
                                    <div className="text-3xl font-bold text-letus-orange">{progress}%</div>
                                    <div className="text-xs text-slate-400">제출 완료</div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-6">
                            <div className="w-full bg-white/10 rounded-full h-2">
                                <div className="bg-letus-orange h-2 rounded-full" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>
                    </div>

                    <div className="container mx-auto px-4 -mt-6 space-y-4 max-w-lg">
                        <Card className="shadow-lg border-0 bg-white">
                            <CardHeader className="pb-3 border-b"><CardTitle className="text-lg">필수 제출 서류 (9개)</CardTitle></CardHeader>
                            <CardContent className="p-0 divide-y">
                                {checklist.map(item => (
                                    <div key={item.id} onClick={() => onNavigate('upload', { item, user })} className="flex items-center justify-between p-4 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${item.status === 'completed' ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}>
                                                {item.status === 'completed' ? <Icons.Check className="h-5 w-5" /> : <Icons.FileText className="h-5 w-5" />}
                                            </div>
                                            <div>
                                                <div className="font-bold text-sm">{item.title}</div>
                                                <div className="text-xs text-slate-500">{item.required ? '필수' : '선택'}</div>
                                            </div>
                                        </div>
                                        <Icons.ChevronRight className="h-4 w-4 text-slate-300" />
                                    </div>
                                ))}
                            </CardContent>
                        </Card>
                    </div>
                </div>
            )
        }

        const LandingPage = ({ onNavigate }) => {
            const [role, setRole] = useState(null);
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [selectedRegion, setSelectedRegion] = useState("");
            const [selectedSubRegion, setSelectedSubRegion] = useState("");
            const [adminPw, setAdminPw] = useState("");

            const regions = useMemo(() => Array.from(new Set(REGIONAL_DATA.map(d => d.region))), []);
            const subRegions = useMemo(() => {
                if (!selectedRegion) return [];
                return REGIONAL_DATA.filter(d => d.region === selectedRegion).map(d => d.subRegion);
            }, [selectedRegion]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (role === 'admin') {
                    if (adminPw !== "letus2024") {
                        alert("관리자 비밀번호가 일치하지 않습니다.");
                        return;
                    }
                } else {
                    if (!name || !phone || !selectedRegion || !selectedSubRegion) {
                        alert("정보를 모두 입력해주세요."); return;
                    }
                }
                onNavigate(role === 'admin' ? 'admin' : (role === 'manager' ? 'manager' : 'courier'), { name, region: selectedRegion, subRegion: selectedSubRegion, role });
            };

            return (
                <div className="flex flex-col min-h-screen bg-letus-light/30 items-center justify-center p-4">
                    <div className="max-w-md w-full space-y-8">
                        <div className="text-center space-y-2">
                            <div className="inline-block p-3 rounded-full bg-white shadow-sm mb-4">
                                <Icons.ShieldCheck className="w-10 h-10 text-letus-orange" />
                            </div>
                            <h1 className="text-3xl font-bold tracking-tight text-letus-black">LETUS 서류 통합 관리</h1>
                            <p className="text-letus-charcoal/80">필수 서류 제출 포털</p>
                        </div>
                        <Card className="border-slate-200 shadow-xl bg-white/90 backdrop-blur">
                            <CardHeader>
                                <CardTitle>로그인 / 서류 제출</CardTitle>
                            </CardHeader>
                            <CardContent>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div onClick={() => setRole("manager")} className={`cursor-pointer rounded-xl border-2 p-4 flex flex-col items-center gap-3 relative transition-all ${role === "manager" ? "border-letus-orange bg-letus-light text-letus-orange scale-105" : "border-slate-100 hover:border-slate-300"}`}>
                                            <Icons.Building2 className="h-8 w-8" /> <span className="font-bold">영업소장</span>
                                            {role === "manager" && <Icons.CheckCircle2 className="h-5 w-5 absolute top-3 right-3 text-letus-orange" />}
                                        </div>
                                        <div onClick={() => setRole("courier")} className={`cursor-pointer rounded-xl border-2 p-4 flex flex-col items-center gap-3 relative transition-all ${role === "courier" ? "border-letus-orange bg-letus-light text-letus-orange scale-105" : "border-slate-100 hover:border-slate-300"}`}>
                                            <Icons.Truck className="h-8 w-8" /> <span className="font-bold">택배기사</span>
                                            {role === "courier" && <Icons.CheckCircle2 className="h-5 w-5 absolute top-3 right-3 text-letus-orange" />}
                                        </div>
                                    </div>

                                    <div className="text-right">
                                        <button type="button" onClick={() => setRole("admin")} className={`text-xs hover:underline transition-colors ${role === 'admin' ? 'text-letus-orange font-bold' : 'text-slate-400'}`}>
                                            {role === 'admin' ? '● 관리자 모드 선택됨' : '관리자 접속'}
                                        </button>
                                    </div>

                                    {role === 'admin' && (
                                        <div className="space-y-4">
                                            <div className="bg-slate-100 p-3 rounded-md text-sm text-slate-600">
                                                <span className="font-bold text-letus-orange">🔒 보안 접속</span><br />
                                                담당자 전용 페이지입니다. 비밀번호를 입력하세요.
                                            </div>
                                            <Input type="password" placeholder="비밀번호 입력" value={adminPw} onChange={e => setAdminPw(e.target.value)} />
                                        </div>
                                    )}

                                    {role && role !== 'admin' && (
                                        <div className="space-y-4">
                                            <select className="w-full h-10 rounded-md border border-input bg-background px-3" value={selectedRegion} onChange={e => setSelectedRegion(e.target.value)}>
                                                <option value="">소속 센터 선택</option>
                                                {regions.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                            <select className="w-full h-10 rounded-md border border-input bg-background px-3" value={selectedSubRegion} onChange={e => setSelectedSubRegion(e.target.value)} disabled={!selectedRegion}>
                                                <option value="">소속 영업소 선택</option>
                                                {subRegions.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                            <div className="grid grid-cols-2 gap-4">
                                                <Input placeholder="성명" value={name} onChange={e => setName(e.target.value)} />
                                                <Input placeholder="전화번호" value={phone} onChange={e => setPhone(e.target.value)} />
                                            </div>
                                        </div>
                                    )}

                                    <Button type="submit" className="w-full h-12 text-base font-bold shadow-lg shadow-letus-orange/20 transition-transform active:scale-95">
                                        {role === 'admin' ? '관리자 대시보드 입장' : '시작하기'}
                                        <Icons.ChevronRight className="ml-2 h-4 w-4" />
                                    </Button>
                                </form>
                            </CardContent>
                        </Card>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState("landing");
            const [data, setData] = useState(null); // navigation payload

            const navigate = (p, d) => {
                if (p === -1) {
                    if (data?.user?.role === 'manager') setPage('manager');
                    else if (data?.user?.role === 'courier') setPage('courier');
                    else setPage('landing');
                    return;
                }
                if (d) setData(d);
                setPage(p);
            }

            return (
                <div className="font-sans antialiased text-slate-900">
                    {page === 'landing' && <LandingPage onNavigate={navigate} />}
                    {page === 'manager' && <ManagerDashboard user={data} onNavigate={navigate} />}
                    {page === 'courier' && <CourierDashboard user={data} onNavigate={navigate} />}
                    {page === 'admin' && <AdminDashboard onNavigate={navigate} />}
                    {page === 'upload' && <UploadPage data={data} onNavigate={navigate} />}
                </div>
            )
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
